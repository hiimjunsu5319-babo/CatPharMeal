<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff3d7">
  <meta name="description" content="가톨릭대학교 식당의 이번 주 PDF 메뉴표를 바로 확인하는 PWA">
  <title>가약학식</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=20260611-2">
</head>
<body>
  <main class="app-shell">
    <section id="homeView" class="home-view">
      <header class="home-hero">
        <p class="eyebrow">Gayaak Meal</p>
        <h1>가약학식</h1>
        <p>오늘도 맛있는거 먹고 힘내자!</p>
      </header>

      <section class="school-list" aria-label="학교 선택">
        <button id="catholicCard" class="school-card" type="button">
          <span class="school-badge">🍱</span>
          <span>
            <strong>가톨릭대 급식</strong>
            <small>Buon Pranzo · Cafe Bona</small>
          </span>
          <span class="school-arrow">›</span>
        </button>
      </section>

      <section class="fortune-editor" aria-label="행운 문구 적기">
        <label for="fortuneInput">행운 문구 쓰기</label>
        <div class="fortune-input-row">
          <input id="fortuneInput" type="text" maxlength="40" placeholder="예: 오늘은 내가 제일 맛있는 메뉴를 고를 차례">
          <button id="fortuneSaveButton" type="button">저장</button>
        </div>
        <button id="fortuneDrawButton" class="fortune-draw-button" type="button">행운뽑기</button>
      </section>
    </section>

    <section id="mealView" class="meal-view" hidden>
      <header class="topbar">
        <button id="backButton" class="icon-button" type="button" aria-label="뒤로 가기">‹</button>
        <div>
          <p class="eyebrow">가톨릭대학교</p>
          <p id="fortuneText" class="fortune-text"></p>
          <h1>이번 주 학식 <span id="weekRange" class="week-range"></span></h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" aria-label="새로고침">↻</button>
      </header>

      <section class="summary">
        <strong id="sourceName">가톨릭대학교 식당</strong>
        <span id="pdfTitle">먹고 싶은 식당을 골라주세요</span>
      </section>

      <nav id="restaurantTabs" class="restaurant-tabs" aria-label="식당 선택"></nav>

      <section class="pdf-stage" aria-live="polite">
        <iframe id="pdfFrame" class="pdf-frame" title="가톨릭대학교 학식 메뉴표"></iframe>
        <div id="emptyState" class="empty-state">
          <strong>메뉴표를 준비하고 있어요</strong>
          <span>가톨릭대 식당 페이지에서 이번 주 PDF 링크를 확인하고 있습니다.</span>
        </div>
      </section>

      <div class="action-row">
        <a id="openPdfButton" class="primary-button" href="#" target="_blank" rel="noreferrer">PDF 크게 열기</a>
        <a id="sourceButton" class="secondary-button" href="https://www.catholic.ac.kr/ko/campuslife/restaurant.do" target="_blank" rel="noreferrer">원본 사이트</a>
      </div>
    </section>
  </main>

  <script src="api-config.js?v=20260611-3"></script>
  <script src="app.js?v=20260611-3"></script>
</body>
</html>
